name: ai_tutor_app
description: AI-powered tutoring application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (Updated versions)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Google Sign In
  google_sign_in: ^6.2.2

  # Local Storage
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.6

  # Video Player
  youtube_player_flutter: ^9.0.0
  video_player: ^2.9.0

  # HTTP for API calls
  http: ^1.2.0

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.3

  # Notifications
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Analytics
  firebase_analytics: ^11.3.3

  # Charts
  fl_chart: ^0.69.0

  # Storage
  firebase_storage: ^12.3.4

  # Payment Gateway
  flutter_stripe: ^11.1.0

  # Crash Reporting
  firebase_crashlytics: ^4.1.3

  # URL Launcher
  url_launcher: ^6.3.1

  # XML Parsing
  xml: ^6.5.0
  path_provider: ^2.1.2
  file_picker: ^8.0.0+1

  # Date Formatting
  intl: ^0.19.0

  # For AI API integration (you can use OpenAI, Gemini, or custom)
  # Uncomment the one you prefer:
  # openai_dart: ^latest
  # google_generative_ai: ^latest

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Add your assets here
  assets:
    - assets/
    - assets/google.png
    - assets/course_content_template.xml

  # Uncomment and add fonts if you want custom fonts
  # To use Poppins font:
  # 1. Download Poppins from Google Fonts
  # 2. Create fonts/ folder in project root
  # 3. Add .ttf files there
  # 4. Uncomment below:

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: fonts/Poppins-Regular.ttf
  #       - asset: fonts/Poppins-Bold.ttf
  #         weight: 700